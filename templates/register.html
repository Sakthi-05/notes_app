<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends "base.html" %}

{% block content %}

<h2>Register</h2>

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input
class="form-control"
type="text"
name="username"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
class="form-control"
type="email"
name="email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
class="form-control"
type="password"
name="password"
required>

</div>

<button class="btn btn-success">

Register

</button>

</form>

{% endblock %}
</body>
</html>
